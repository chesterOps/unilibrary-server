services:
  - type: web
    name: unilibrary-server
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: cron
    name: keep-alive-ping
    runtime: node
    schedule: "*/14 * * * *"
    buildCommand: ""
    startCommand: node -e "const https = require('https'); const req = https.get('https://unilibrary-server.onrender.com/', { timeout: 10000 }, (r) => { console.log('ping ok:', r.statusCode); r.resume(); }).on('timeout', () => { console.log('ping timeout'); req.destroy(); }).on('error', (e) => { console.log('ping error:', e.message); });"
